<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utah Neighborhood Matcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:        #B85C38;
      --accent-light:  rgba(184,92,56,0.08);
      --accent-border: rgba(184,92,56,0.25);
      --bg:            #FAFAF8;
      --surface:       #FFFFFF;
      --text-primary:  #1A1A18;
      --text-secondary:#6B6B67;
      --text-muted:    #A0A09C;
      --border:        rgba(0,0,0,0.10);
      --border-hover:  rgba(0,0,0,0.20);
      --radius-sm:     8px;
      --radius-md:     12px;
      --radius-lg:     16px;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      width: 100%;
      max-width: 560px;
      padding: 48px 24px 80px;
      flex: 1;
    }

    .wordmark {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 15px;
      color: var(--accent);
      margin-bottom: 48px;
      letter-spacing: 0.01em;
    }

    .progress-track {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    .step { animation: stepIn 0.3s cubic-bezier(0.4,0,0.2,1); }
    @keyframes stepIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(26px, 5vw, 34px);
      font-weight: 400;
      line-height: 1.25;
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    h2.question {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(20px, 4vw, 26px);
      font-weight: 400;
      line-height: 1.3;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 300;
      margin-bottom: 24px;
    }
    .body-text {
      font-size: 15px;
      color: var(--text-secondary);
      font-weight: 300;
      line-height: 1.75;
      margin-bottom: 32px;
    }

    .options { display: flex; flex-direction: column; gap: 8px; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .option {
      display: block;
      width: 100%;
      padding: 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .option:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .option.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 500; }

    .select-wrap { position: relative; margin-bottom: 8px; }
    select {
      width: 100%;
      padding: 13px 40px 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      appearance: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    select:focus { outline: none; border-color: var(--accent); }
    .select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); }

    .btn {
      display: inline-block;
      padding: 13px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    .btn-full { width: 100%; text-align: center; }
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent-border);
    }
    .btn-ghost:hover { background: var(--accent-light); opacity: 1; }

    .back-btn {
      background: none;
      border: none;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 20px;
      display: inline-block;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text-secondary); }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: var(--accent); }
    input::placeholder { color: var(--text-muted); }

    .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .gate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }
    .gate-card h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 10px;
      line-height: 1.3;
      color: var(--text-primary);
    }
    .gate-sub {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 300;
      line-height: 1.65;
      margin-bottom: 20px;
    }
    .privacy-note {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
    }

    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      gap: 20px;
      text-align: center;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text-primary);
    }
    .loading-sub { font-size: 13px; color: var(--text-secondary); font-weight: 300; }

    .result-match {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(22px, 4vw, 28px);
      font-weight: 400;
      line-height: 1.25;
      color: var(--text-primary);
      margin-bottom: 24px;
    }
    .result-body { font-size: 15px; color: var(--text-secondary); font-weight: 300; line-height: 1.8; }
    .result-body p { margin-bottom: 16px; }
    .divider { height: 1px; background: var(--border); margin: 28px 0; }
    .cta-box {
      background: var(--accent-light);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-md);
      padding: 24px;
    }
    .cta-box p { font-size: 14px; color: var(--text-secondary); font-weight: 300; line-height: 1.65; margin-bottom: 16px; }
    .cta-pair { display: flex; gap: 10px; flex-wrap: wrap; }

    footer {
      width: 100%;
      text-align: center;
      padding: 24px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .page { padding: 32px 20px 64px; }
      .options-grid { grid-template-columns: 1fr; }
      .cta-pair { flex-direction: column; }
    }
  </style>
</head>
<body>

<main class="page">
  <div class="wordmark">Utah Matcher</div>
  <div id="root"></div>
</main>

<footer>© 2025 Utah Matcher · Free relocation tool</footer>

<script>
const QUESTIONS = [
  {
    id: "from",
    question: "Where are you moving from?",
    type: "select",
    options: [
      "Austin, TX","Dallas, TX","Houston, TX","San Antonio, TX",
      "Los Angeles, CA","San Francisco, CA","San Diego, CA","Sacramento, CA",
      "Phoenix, AZ","Denver, CO","Seattle, WA","Portland, OR",
      "Chicago, IL","New York, NY","Las Vegas, NV","Boise, ID","Other"
    ]
  },
  {
    id: "situation",
    question: "Who's making the move?",
    type: "single",
    options: ["Just me","Me & my partner","Family with young kids","Family with teens","Empty nester / retiree"]
  },
  {
    id: "work",
    question: "What's your work situation in Utah?",
    type: "single",
    options: ["Fully remote","Commute to Salt Lake City","Commute to Provo / Utah County","Still figuring it out"]
  },
  {
    id: "priorities",
    question: "What matters most to you?",
    subtitle: "Choose up to 3",
    type: "multi",
    max: 3,
    options: ["Top-rated schools","Outdoor access","Lower home prices","New construction","Short commute","Restaurants & nightlife","Quiet & suburban","Strong community vibe"]
  },
  {
    id: "budget",
    question: "What's your home budget?",
    type: "single",
    options: ["Under $400K","$400K – $550K","$550K – $750K","$750K+"]
  },
  {
    id: "timeline",
    question: "When are you planning to move?",
    type: "single",
    options: ["1–3 months","3–6 months","6–12 months","Just exploring"]
  }
];

let state = { step: 0, answers: {}, user: {}, result: "", error: "" };
const root = document.getElementById("root");

function render() {
  root.innerHTML = "";
  const el = document.createElement("div");
  el.className = "step";
  if (state.step === 0)                         el.appendChild(renderIntro());
  else if (state.step <= QUESTIONS.length)      el.appendChild(renderQuestion());
  else if (state.step === QUESTIONS.length + 1) el.appendChild(renderGate());
  else if (state.step === QUESTIONS.length + 2) el.appendChild(renderLoading());
  else                                          el.appendChild(renderResult());
  root.appendChild(el);
}

function renderIntro() {
  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <p class="eyebrow">Free Relocation Tool</p>
    <h1>Find your perfect Utah neighborhood in 2 minutes</h1>
    <p class="body-text">Answer 6 quick questions and get a personalized neighborhood match — with specific insight into what your budget actually buys, which areas fit your lifestyle, and what people moving from your city typically miss.</p>
    <button class="btn" id="start-btn">Find my match →</button>
  `;
  wrap.querySelector("#start-btn").addEventListener("click", () => { state.step = 1; render(); });
  return wrap;
}

function renderProgress(step) {
  const pct = Math.round((step / QUESTIONS.length) * 100);
  const wrap = document.createElement("div");
  wrap.innerHTML = `<div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  return wrap;
}

function renderQuestion() {
  const q = QUESTIONS[state.step - 1];
  const wrap = document.createElement("div");
  wrap.appendChild(renderProgress(state.step));
  const eyebrow = document.createElement("p");
  eyebrow.className = "eyebrow";
  eyebrow.textContent = `Question ${state.step} of ${QUESTIONS.length}`;
  wrap.appendChild(eyebrow);
  const qEl = document.createElement("h2");
  qEl.className = "question";
  qEl.textContent = q.question;
  wrap.appendChild(qEl);
  if (q.subtitle) {
    const sub = document.createElement("p");
    sub.className = "subtitle";
    sub.textContent = q.subtitle;
    wrap.appendChild(sub);
  } else {
    wrap.appendChild(document.createElement("br"));
  }
  if (q.type === "select")      wrap.appendChild(renderSelect(q));
  else if (q.type === "single") wrap.appendChild(renderSingle(q));
  else if (q.type === "multi")  wrap.appendChild(renderMulti(q));
  if (state.step > 1) {
    const back = document.createElement("button");
    back.className = "back-btn";
    back.textContent = "← Back";
    back.addEventListener("click", () => { state.step--; render(); });
    wrap.appendChild(back);
  }
  return wrap;
}

function renderSelect(q) {
  const saved = state.answers[q.id] || "";
  const wrap = document.createElement("div");
  const selectWrap = document.createElement("div");
  selectWrap.className = "select-wrap";
  const sel = document.createElement("select");
  sel.innerHTML = `<option value="">Select your city…</option>` +
    q.options.map(o => `<option value="${o}" ${saved === o ? "selected" : ""}>${o}</option>`).join("");
  sel.addEventListener("change", () => { state.answers[q.id] = sel.value; nextBtn.disabled = !sel.value; });
  const arrow = document.createElement("span");
  arrow.className = "select-arrow";
  arrow.textContent = "▾";
  selectWrap.appendChild(sel);
  selectWrap.appendChild(arrow);
  const nextBtn = document.createElement("button");
  nextBtn.className = "btn";
  nextBtn.textContent = "Next →";
  nextBtn.disabled = !saved;
  nextBtn.style.marginTop = "16px";
  nextBtn.addEventListener("click", () => { if (state.answers[q.id]) { state.step++; render(); } });
  wrap.appendChild(selectWrap);
  wrap.appendChild(nextBtn);
  return wrap;
}

function renderSingle(q) {
  const saved = state.answers[q.id] || "";
  const wrap = document.createElement("div");
  wrap.className = "options";
  q.options.forEach(o => {
    const btn = document.createElement("button");
    btn.className = `option${saved === o ? " selected" : ""}`;
    btn.textContent = o;
    btn.addEventListener("click", () => { state.answers[q.id] = o; setTimeout(() => { state.step++; render(); }, 220); });
    wrap.appendChild(btn);
  });
  return wrap;
}

function renderMulti(q) {
  const saved = state.answers[q.id] || [];
  const wrap = document.createElement("div");
  const grid = document.createElement("div");
  grid.className = "options-grid";
  q.options.forEach(o => {
    const btn = document.createElement("button");
    btn.className = `option${saved.includes(o) ? " selected" : ""}`;
    btn.textContent = o;
    btn.addEventListener("click", () => {
      const cur = state.answers[q.id] || [];
      if (cur.includes(o)) state.answers[q.id] = cur.filter(v => v !== o);
      else if (cur.length < q.max) state.answers[q.id] = [...cur, o];
      render();
    });
    grid.appendChild(btn);
  });
  const nextBtn = document.createElement("button");
  nextBtn.className = "btn";
  nextBtn.textContent = "Next →";
  nextBtn.disabled = saved.length === 0;
  nextBtn.style.marginTop = "16px";
  nextBtn.addEventListener("click", () => { if ((state.answers[q.id] || []).length > 0) { state.step++; render(); } });
  wrap.appendChild(grid);
  wrap.appendChild(nextBtn);
  return wrap;
}

function renderGate() {
  const wrap = document.createElement("div");
  const card = document.createElement("div");
  card.className = "gate-card";
  card.innerHTML = `
    <p class="eyebrow">Your match is ready</p>
    <h2>Unlock your personalized Utah neighborhood report</h2>
    <p class="gate-sub">Get your full neighborhood match, specific price data for your budget, and the option to connect with a local Utah agent — all free.</p>
    <div class="form-group">
      <input type="text"  id="inp-name"  placeholder="First name" autocomplete="given-name" />
      <input type="email" id="inp-email" placeholder="Email address" autocomplete="email" />
      <input type="tel"   id="inp-phone" placeholder="Phone number (optional)" autocomplete="tel" />
    </div>
    <button class="btn btn-full" id="gate-submit">Show my neighborhood match →</button>
    <p class="privacy-note">No spam. Your info is only used to send your report and connect you with an agent if you request it.</p>
  `;
  card.querySelector("#gate-submit").addEventListener("click", () => {
    const name  = card.querySelector("#inp-name").value.trim();
    const email = card.querySelector("#inp-email").value.trim();
    const phone = card.querySelector("#inp-phone").value.trim();
    if (!name || !email) {
      if (!name)  card.querySelector("#inp-name").style.borderColor  = "red";
      if (!email) card.querySelector("#inp-email").style.borderColor = "red";
      return;
    }
    state.user = { name, email, phone };
    submitAnswers();
  });
  const back = document.createElement("button");
  back.className = "back-btn";
  back.textContent = "← Back";
  back.addEventListener("click", () => { state.step--; render(); });
  wrap.appendChild(card);
  wrap.appendChild(back);
  return wrap;
}

function renderLoading() {
  const wrap = document.createElement("div");
  wrap.className = "loading-screen";
  wrap.innerHTML = `
    <div class="spinner"></div>
    <p class="loading-title">Analyzing your profile…</p>
    <p class="loading-sub">Matching your priorities against Utah neighborhoods</p>
  `;
  return wrap;
}

function renderResult() {
  const wrap = document.createElement("div");
  const lines = state.result.split("\n").filter(l => l.trim());
  const matchLine = lines[0].replace(/^Your Match:\s*/i, "").trim();
  const bodyParas = lines.slice(1);
  wrap.innerHTML = `
    <p class="eyebrow">Your neighborhood match</p>
    <h1 class="result-match">${matchLine}</h1>
    <div class="result-body" id="result-body"></div>
    <div class="divider"></div>
    <div class="cta-box">
      <p>Want to see homes, get school district breakdowns, and talk to someone who actually knows these streets?</p>
      <div class="cta-pair">
        <a href="mailto:your@email.com?subject=Utah Relocation Inquiry" class="btn">Connect with a Utah agent</a>
        <button class="btn btn-ghost" onclick="resetTool()">Start over</button>
      </div>
    </div>
  `;
  const bodyEl = wrap.querySelector("#result-body");
  bodyParas.forEach(para => {
    if (para.trim()) {
      const p = document.createElement("p");
      p.textContent = para.trim();
      bodyEl.appendChild(p);
    }
  });
  return wrap;
}

async function submitAnswers() {
  state.step = QUESTIONS.length + 2;
  render();
  try {
    const response = await fetch("/api/match", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ answers: state.answers, user: state.user })
    });
    const data = await response.json();
    state.result = data.error ? "We couldn't generate your match right now. Please try again." : data.result;
  } catch (e) {
    state.result = "Something went wrong. Please try again.";
  }
  state.step = QUESTIONS.length + 3;
  render();
}

function resetTool() {
  state = { step: 0, answers: {}, user: {}, result: "", error: "" };
  render();
}

render();
</script>
</body>
</html>
